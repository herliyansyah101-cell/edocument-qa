<!DOCTYPE html>
<html>

<head>
  <title>Daftar Dokumen</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="header">
    <img src="images/logo.png">
    <h2>Daftar Dokumen</h2>
  </div>

  <div class="container">

    <div class="card">
      <h3>List Dokumen</h3>
      <div id="summary" style="
display:flex;
gap:20px;
margin-bottom:15px;
"></div>

      <input type="text" id="search" placeholder="Cari batch / produk...">
      <button onclick="searchData()">Cari</button>
      <button onclick="loadData()">Reset</button>

      <table border="1" width="100%" id="tabelDokumen">
        <thead>
          <tr>
            <th>No</th>
            <th>Kategori</th>
            <th>Line</th>
            <th>Kode</th>
            <th>Produk</th>
            <th>Batch</th>
            <th>Tahun</th>
            <th>COA</th>
            <th>CHP QA</th>
            <th>EM</th>
            <th>CHP QC</th>
            <th>Manager</th>
            <th>Progress</th>
            <th>Lokasi</th>
            <th>Status</th>
            <th>Prioritas</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>

  </div>

  const role = localStorage.getItem("role");

  <script>

    function icon(val) {
      return val ? "✅" : "❌";
    }

    function tampilkanData(data) {

      const role = localStorage.getItem("role"); // 🔥 ambil role sekali

      let totalData = data.length;
      let lengkap = 0;
      let belum = 0;

      let html = "";

      // 🔥 SORT
      data.sort((a, b) => {

        const countA =
          (a.coa ? 1 : 0) + (a.chp_qa ? 1 : 0) + (a.em ? 1 : 0) + (a.chp_qc ? 1 : 0) + (a.approve_manager ? 1 : 0);

        const countB =
          (b.coa ? 1 : 0) + (b.chp_qa ? 1 : 0) + (b.em ? 1 : 0) + (b.chp_qc ? 1 : 0) + (b.approve_manager ? 1 : 0);

        return countA - countB;
      });

      data.forEach((d, i) => {

        // 🔥 PROGRESS
        const total = 5;

        const terisi =
          (d.coa ? 1 : 0) +
          (d.chp_qa ? 1 : 0) +
          (d.em ? 1 : 0) +
          (d.chp_qc ? 1 : 0) +
          (d.approve_manager ? 1 : 0);

        if (terisi === total) {
          lengkap++;
        } else {
          belum++;
        }

        let warna = terisi === total ? "green" : "red";

        // 🔥 LOKASI
        let lokasi = "-";
        if (d.lemari && d.lemari !== "-") {
          lokasi = `L${d.lemari}-R${d.rak}-B${d.box}`;
        }

        // 🔥 STATUS
        let status = d.status || "-";

        function cek(val, field) {
          return `<span onclick="toggleChecklist(${d.id}, '${field}', ${val})"
        style="cursor:pointer;font-size:18px;">
        ${val ? "✅" : "❌"}
      </span>`;
        }

        // 🔥 AKSI (ROLE BASED)
        let aksi = "";

        if (role === "admin") {
          aksi = `
        <button class="btn-edit" onclick='editData(${JSON.stringify(d)})'>Edit</button>
        <button class="btn-delete" onclick="hapusData(${d.id})">Hapus</button>
        <button onclick='setLokasi(${JSON.stringify(d)})'>Lokasi</button>
      `;
        } else {
          aksi = `
        <button onclick="pinjam(${d.id})">Pinjam</button>
      `;
        }

        html += `
      <tr style="${terisi === total ? 'background:#e8ffe8' : 'background:#ffe8e8'}">
        <td>${i + 1}</td>
        <td>${d.kategori || "-"}</td>
        <td>${d.line || "-"}</td>
        <td>${d.kode_produk || "-"}</td>
        <td>${d.produk || "-"}</td>
        <td>${d.batch || "-"}</td>
        <td>${d.tahun || "-"}</td>

        <td>${cek(d.coa, "coa")}</td>
        <td>${cek(d.chp_qa, "chp_qa")}</td>
        <td>${cek(d.em, "em")}</td>
        <td>${cek(d.chp_qc, "chp_qc")}</td>
        <td>${cek(d.approve_manager, "approve_manager")}</td>

        <td>
          <span style="color:${warna};font-weight:bold;">
            ${terisi}/${total}
          </span>
        </td>

        <td>${lokasi}</td>
        <td>${status}</td>

        <td>
          ${terisi < total ? '<span style="color:red;">⚠️ Prioritas</span>' : ''}
        </td>

        <td>${aksi}</td>
      </tr>
    `;
      });

      // 🔥 SUMMARY
      let persen = totalData ? Math.round((lengkap / totalData) * 100) : 0;

      document.getElementById("summary").innerHTML = `
    <div class="stat-card">
      <h4>Total</h4>
      <h2>${totalData}</h2>
    </div>

    <div class="stat-card">
      <h4>Lengkap</h4>
      <h2 style="color:green;">${lengkap}</h2>
    </div>

    <div class="stat-card">
      <h4>Belum</h4>
      <h2 style="color:red;">${belum}</h2>
    </div>

    <div class="stat-card">
      <h4>% Kelengkapan</h4>
      <h2>${persen}%</h2>
    </div>
  `;

      document.querySelector("#tabelDokumen tbody").innerHTML = html;
    }

    // LOAD DATA
    async function loadData() {
      const res = await fetch("/api/dokumen");
      const data = await res.json();
      tampilkanData(data);
    }

    // SEARCH
    async function searchData() {
      const keyword = document.getElementById("search").value;

      const res = await fetch("/api/dokumen");
      const data = await res.json();

      const filtered = data.filter(d =>
        d.batch.includes(keyword) ||
        (d.produk || "").toLowerCase().includes(keyword.toLowerCase())
      );

      tampilkanData(filtered);
    }

    // PINJAM
    async function pinjam(id) {

      console.log("klik pinjam", id);

      const nama = prompt("Masukkan nama peminjam:");

      if (!nama) return;

      const res = await fetch("/api/pinjam", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          dokumen_id: id,
          nama: nama
        })
      });

      const hasil = await res.text();
      showToast(hasil);

    }

    async function approve(id) {

      const res = await fetch("/api/approve-dokumen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });

      const hasil = await res.text();
      showToast(hasil);

      loadData();
    }

    function setLokasi(d) {

      document.getElementById("modalLokasi").style.display = "flex";

      document.getElementById("lemari").value = d.lemari || "";
      document.getElementById("rak").value = d.rak || "";
      document.getElementById("box").value = d.box || "";

      document.getElementById("modalLokasi").setAttribute("data-id", d.id);
    }

    function closeLokasi() {
      document.getElementById("modalLokasi").style.display = "none";
    }

    async function saveLokasi() {

      const id = document.getElementById("modalLokasi").getAttribute("data-id");

      const data = {
        id,
        lemari: document.getElementById("lemari").value,
        rak: document.getElementById("rak").value,
        box: document.getElementById("box").value
      };

      const res = await fetch("/api/set-lokasi", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const hasil = await res.text();

      showToast(hasil);
      closeLokasi();
      loadData();
    }

    async function hapusData(id) {

      if (!confirm("Yakin mau hapus?")) return;

      const res = await fetch("/api/hapus-dokumen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });

      const hasil = await res.text();
      showToast(hasil);

      loadData();
    }

    function editData(d) {

      document.getElementById("modalEdit").style.display = "flex";

      document.getElementById("saveEdit").setAttribute("data-id", d.id);

      document.getElementById("editKode").value = d.kode_produk || "";
      document.getElementById("editNama").value = d.produk || "";
      document.getElementById("editBatch").value = d.batch || "";
      document.getElementById("editLine").value = d.line || "";
      document.getElementById("editTahun").value = d.tahun || "";
    }

    async function toggleChecklist(id, field, current) {

      const newValue = current ? 0 : 1;

      await fetch("/api/update-checklist", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id,
          field,
          value: newValue
        })
      });

      loadData();
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.innerText = msg;
      toast.style.display = "block";

      setTimeout(() => {
        toast.style.display = "none";
      }, 2000);
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");

      toast.innerText = message;
      toast.className = "toast show " + type;

      setTimeout(() => {
        toast.className = "toast";
      }, 3000);
    }

    function closeEdit() {
      document.getElementById("modalEdit").style.display = "none";
    }

    async function saveEdit() {

      const id = document.getElementById("saveEdit").getAttribute("data-id");
      const nama = document.getElementById("editNama").value;

      const res = await fetch("/api/edit-dokumen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id,
          produk: nama
        })
      });

      const hasil = await res.text();

      showToast(hasil);
      closeEdit();
      loadData(); // refresh tabel
    }

    function closeEdit() {
      document.getElementById("modalEdit").style.display = "none";
    }

    async function saveEdit() {

      const id = document.getElementById("saveEdit").getAttribute("data-id");

      const data = {
        id,
        kode_produk: document.getElementById("editKode").value,
        produk: document.getElementById("editNama").value,
        batch: document.getElementById("editBatch").value,
        tahun: document.getElementById("editTahun").value,
        line: document.getElementById("editLine").value // ✅
      };

      const res = await fetch("/api/edit-dokumen", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const hasil = await res.text();

      showToast(hasil);
      closeEdit();
      loadData();
    }

    function setLokasi(d) {

      document.getElementById("modalLokasi").style.display = "flex";

      document.getElementById("lemari").value = d.lemari || "";
      document.getElementById("rak").value = d.rak || "";
      document.getElementById("box").value = d.box || "";

      document.getElementById("modalLokasi").setAttribute("data-id", d.id);
    }

    function closeLokasi() {
      document.getElementById("modalLokasi").style.display = "none";
    }

    async function saveLokasi() {

      const id = document.getElementById("modalLokasi").getAttribute("data-id");

      const data = {
        id,
        lemari: document.getElementById("lemari").value,
        rak: document.getElementById("rak").value,
        box: document.getElementById("box").value
      };

      const res = await fetch("/api/set-lokasi", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const hasil = await res.text();

      showToast(hasil);
      closeLokasi();
      loadData();
    }

    function closeLokasi() {
      document.getElementById("modalLokasi").style.display = "none";
    }

    async function saveLokasi() {

      const id = document.getElementById("modalLokasi").getAttribute("data-id");

      const data = {
        id,
        lemari: document.getElementById("lemari").value,
        rak: document.getElementById("rak").value,
        box: document.getElementById("box").value
      };

      const res = await fetch("/api/set-lokasi", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const hasil = await res.text();

      showToast(hasil);
      closeLokasi();
      loadData();
    }

    // AUTO LOAD
    loadData();

  </script>

  <div id="toast" style="
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px 20px;
border-radius:8px;
display:none;
z-index:999;
"></div>

  <div id="toast" class="toast"></div>
  <div id="modalEdit" class="modal2">
    <div class="modal-box">

      <h3>Edit Dokumen</h3>

      <label>Kode Produk</label>
      <input type="text" id="editKode">

      <label>Nama Produk</label>
      <input type="text" id="editNama">

      <label>Batch</label>
      <input type="text" id="editBatch">

      <label>Line</label>
      <input type="text" id="editLine">

      <label>Tahun</label>
      <input type="number" id="editTahun">

      <div class="modal-action">
        <button onclick="closeEdit()">Batal</button>
        <button id="saveEdit" onclick="saveEdit()">Simpan</button>
      </div>

    </div>
  </div>

  <div id="modalLokasi" class="modal2">
    <div class="modal-box">

      <h3>Set Lokasi Dokumen</h3>

      <label>Lemari</label>
      <input type="number" id="lemari" placeholder="Contoh: 1">

      <label>Rak</label>
      <input type="number" id="rak" placeholder="Contoh: 2">

      <label>Box</label>
      <input type="number" id="box" placeholder="Contoh: 3">

      <div class="modal-action">
        <button onclick="closeLokasi()">Batal</button>
        <button onclick="saveLokasi()">Simpan</button>
      </div>

    </div>
  </div>

</body>

</html>
